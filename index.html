<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Logística Semanal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-bar">
    <div class="logo">📦 Logística Semanal</div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="🔍 Buscar cliente, cidade, tipo..." />
    </div>
    <div class="refresh-info">
      <span id="lastUpdate">--:--</span>
      <span class="refresh-label">Atualiza em <span id="countdown">5:00</span></span>
    </div>
  </header>
  <main id="painelContainer">
    <div class="loading">Carregando dados...</div>
  </main>
  <script src="script.js"></script>
</body>
</html>
