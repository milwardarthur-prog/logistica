<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento Logístico - Full HD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-bar">
        <div class="logo">LOGÍSTICA SEMANAL</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Filtrar por cliente, cidade, equipamento, tipo...">
        </div>
        <div class="refresh-info">
            <span>Próxima atualização em: <strong id="timer">05:00</strong></span>
        </div>
    </header>

    <main id="painelContainer">
        <!-- As linhas de dias e os cards serão gerados aqui pelo script.js -->
    </main>

    <script src="script.js"></script>
</body>
</html>
